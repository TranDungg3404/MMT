[General]
network = mmt.src.IGRP_DistanceVector
sim-time-limit = 800s # Tăng thời gian để xem mạng tự phục hồi sau sự cố

# ========================================================
# KỊCH BẢN 1: MẠNG HOẠT ĐỘNG BÌNH THƯỜNG
# ========================================================
[Config KichBan_1_BinhThuong]
description = "Mang hoat dong on dinh, khong co su co"
sim-time-limit = 400s

# Bật tính năng gửi dữ liệu cho R1 (Để lấy mốc thống kê 100% thành công)
**.R1.isSender = true
**.R1.destNode = "R4"


# ========================================================
# KỊCH BẢN 2: ĐỨT CÁP GIỮA ROUTER 2 VÀ ROUTER 3
# ========================================================
[Config KichBan_2_DutCap_R2_R3]
description = "Gia lap dut cap giua R2 va R3 tai giay thu 150"
sim-time-limit = 400s

# Thiết lập R1 liên tục gửi dữ liệu cho R4
**.R1.isSender = true
**.R1.destNode = "R4"

# Báo cho R2 biết kết nối với R3 sẽ đứt ở giây 150
**.R2.failTime = 150s
**.R2.failNeighbor = "R3"

# Báo cho R3 biết kết nối với R2 sẽ đứt ở giây 150
**.R3.failTime = 150s
**.R3.failNeighbor = "R2"


# ========================================================
# KỊCH BẢN 3: HIỆN TƯỢNG ROUTING LOOP (COUNT-TO-INFINITY)
# ========================================================
[Config KichBan_3_RoutingLoop]
description = "Tat Split Horizon va Triggered Update de the hien vong lap vo tan khi dut cap"
sim-time-limit = 800s

# Thiết lập R1 liên tục gửi dữ liệu
**.R1.isSender = true
**.R1.destNode = "R4" 

# TẮT các cơ chế bảo vệ trên TẤT CẢ các Router
**.enableSplitHorizon = false
**.enableTriggeredUpdate = false

# Gia lập đứt cáp nối R7 tại R2 ở giây thứ 150
**.R2.failTime = 150s
**.R2.failNeighbor = "R7"

# (R7 cũng đứt cáp với R2, nhưng R7 là mạng cụt, không quan trọng bằng R2)
**.R7.failTime = 150s
**.R7.failNeighbor = "R2"